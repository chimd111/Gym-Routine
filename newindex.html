</head>

<body>

<header class="navbar">
  <div class="logo"><span class="whiteshi">GYM</span> ROUTINE</div>
  <nav>
    <a href="#Days">Days</a>
    <a href="#team">Team</a>
    <a href="#demo">Demo</a>
    <a href="#postmortem">Postmortem</a>
  </nav>

<!-- HERO -->
<section class="hero">
  <h1>GYM <span>ROUTINE</span></h1>
  <p>Transform your body and mind with our expert-designed workout plans</p>

</section>

<section id="Days" class="section">
  <h1>Days</h1>


    <div class="daycard" onclick="toggle(this)">
      <h2>MONDAY - Shoulders</h2>

      <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
      <div class="exercises">
        <a class="exercise-link" href="https://www.youtube.com/results?search_query=shoulder+press" target="_blank">
            <i class="ti ti-external-link" aria-hidden="true"></i> Shoulder Press
            <span class="tag mon-tag">3–4 sets</span>
        </a>
        <a class="exercise-link" href="https://www.youtube.com/results?search_query=lateral+raises+for+shoulders" target="_blank">
            <i class="ti ti-external-link" aria-hidden="true"></i> Lateral Raises
            <span class="tag mon-tag">3–4 sets</span>
        </a>
        <a class="exercise-link" href="https://www.youtube.com/results?search_query=front+raises+for+shoulders" target="_blank">
            <i class="ti ti-external-link" aria-hidden="true"></i> Front Raises
            <span class="tag mon-tag">3 sets</span>
        </a>
    </div>
    </div>

    
    <div class="daycard" onclick="toggle(this)">
      <h2>TUESDAY - Biceps & Triceps</h2>
    </div>
    <div class="daycard" onclick="toggle(this)">
      <h2>WEDNESDAY - Chest </h2>
    </div>
    <div class="daycard" onclick="toggle(this)">
      <h2>THURSDAY - Legs </h2>
    </div>
    <div class="daycard" onclick="toggle(this)">
      <h2>FRIDAY - Back</h2>
    </div>
</section>
